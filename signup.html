<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Sign Up</title>
  </head>

  <body>
    <div class="sign-up">
      <!-- Decorative blobs -->
      <div class="ellipse"></div>
      <div class="div"></div>
      <div class="ellipse-2"></div>
      <div class="ellipse-3"></div>
      <div class="ellipse-4"></div>
      <div class="ellipse-5"></div>
      <div class="ellipse-6"></div>
      <div class="ellipse-7"></div>

      <!-- Illustration -->
      <img class="group" src="Group.png" alt="" />

      <!-- Card background -->
      <div class="rectangle"></div>

      <!-- Card content -->
      <div class="frame">
        <div class="div-wrapper">
          <div class="text-wrapper">Sign Up</div>
        </div>

        <form action="login.html" method="GET" class="signup-form">
          <input type="text" placeholder="Username" class="frame-2" required />
          <input type="email" placeholder="Email" class="frame-2" required />
          <input type="password" placeholder="Password" class="frame-2" required />
          <input type="password" placeholder="Konfirmasi Password" class="frame-2" required />

          <div class="frame-3">
            <img class="line" src="img/line-1.svg" alt="" />
            <div class="text-wrapper-3">or</div>
            <img class="img" src="img/line-2.svg" alt="" />
          </div>

          <button type="button" class="frame-4 google-btn">
            <img class="image" src="Google__G__logo.svg.png" alt="Google" />
            <span class="text-wrapper-3">Register with Google</span>
          </button>

          <button type="submit" class="frame-5">
            <span class="text-wrapper-4">Sign Up</span>
          </button>
        </form>

        <div class="frame-6">
          <p class="p">
            Already have an account?
            <a href="login.html" class="signin-link">Sign In</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
