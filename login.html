<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styleguide_login.css" />
    <link rel="stylesheet" href="style_login.css" />
    <link rel="stylesheet" href="global_login.css">
    <link rel="stylesheet" href="style_signup.css" />
    <title>Login</title>
  </head>

  <body>
    <div class="sign-up"> <!-- tetap pakai class ini supaya styling SAMA PERSIS -->

      <!-- Decorative blobs -->
      <div class="ellipse"></div>
      <div class="div"></div>
      <div class="ellipse-2"></div>
      <div class="ellipse-3"></div>
      <div class="ellipse-4"></div>
      <div class="ellipse-5"></div>
      <div class="ellipse-6"></div>
      <div class="ellipse-7"></div>

      <!-- Illustration -->
      <img class="group" src="Group.png" alt="" />

      <!-- Card background -->
      <div class="rectangle"></div>

      <!-- Card content -->
      <div class="frame">

        <!-- 🔥 TAMBAH LOGO DI ATAS -->
        <img src="Logo HealinQ.png" 
             alt="HealinQ Logo" 
             style="width:120px; margin-bottom:10px;" />

        <!-- TITLE -->
        <div class="div-wrapper">
          <div class="text-wrapper">Welcome!</div>
        </div>

        <form action="welcome.html" method="GET" class="signup-form">

          <!-- INPUT LOGIN -->
          <input type="text" placeholder="Username / Email" class="frame-2" required />
          <input type="password" placeholder="Password" class="frame-2" required />

          <!-- OR -->
          <div class="frame-3">
            <img class="line" src="img/line-1.svg" alt="" />
            <div class="text-wrapper-3">or</div>
            <img class="img" src="img/line-2.svg" alt="" />
          </div>

          <!-- GOOGLE LOGIN -->
          <button type="button" class="frame-4 google-btn">
            <img class="image" src="Google__G__logo.svg.png" alt="Google" />
            <span class="text-wrapper-3">Login with Google</span>
          </button>

          <!-- LOGIN BUTTON -->
          <button type="submit" class="frame-5">
            <span class="text-wrapper-4">Login</span>
          </button>
        </form>

        <!-- FOOTER -->
        <div class="frame-6">
          <p class="p">
            Don’t have an account?
            <a href="signup.html" class="signin-link">Sign Up</a>
          </p>
        </div>

      </div>
    </div>
  </body>
</html>
