<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="sign-up">
      <div class="ellipse"></div>
      <div class="div"></div>
      <div class="ellipse-2"></div>
      <div class="ellipse-3"></div>
      <div class="ellipse-4"></div>
      <div class="ellipse-5"></div>
      <div class="ellipse-6"></div>
      <div class="ellipse-7"></div>
      <img class="group" src="img/group.png" />
      <div class="rectangle"></div>
      <div class="frame">
        <div class="div-wrapper"><div class="text-wrapper">Sign Up</div></div>
        <div class="frame-2"><div class="text-wrapper-2">Username</div></div>
        <div class="frame-2"><div class="text-wrapper-2">Email</div></div>
        <div class="frame-2"><div class="text-wrapper-2">Password</div></div>
        <div class="frame-2"><div class="text-wrapper-2">Konfirmasi Password</div></div>
        <div class="frame-3">
          <img class="line" src="img/line-1.svg" />
          <div class="text-wrapper-3">or</div>
          <img class="img" src="img/line-2.svg" />
        </div>
        <div class="frame-4">
          <img class="image" src="img/image-11.png" />
          <div class="text-wrapper-3">Register with Google</div>
        </div>
        <div class="frame-5"><div class="text-wrapper-4">Sign Up</div></div>
        <div class="frame-6"><p class="p">Already have an account? Sign In</p></div>
      </div>
    </div>
  </body>
</html>
