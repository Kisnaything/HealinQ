<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <link rel="stylesheet" href="globals.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="sign-up">
    <div class="ellipse"></div>
    <div class="div"></div>
    <div class="ellipse-2"></div>
    <div class="ellipse-3"></div>
    <div class="ellipse-4"></div>
    <div class="ellipse-5"></div>
    <div class="ellipse-6"></div>
    <div class="ellipse-7"></div>
    <img class="group" src="Group.png" />
    <div class="rectangle"></div>
    <div class="frame">
      <div class="div-wrapper">
        <div class="text-wrapper">Sign Up</div>
      </div>

      <form action="login.html" method="GET"
        style="width:100%; display:flex; flex-direction:column; align-items:center; gap:21.3px;">

        <input type="text" placeholder="Username" class="frame-2" required>

        <input type="email" placeholder="Email" class="frame-2" required>

        <input type="password" placeholder="Password" class="frame-2" required>

        <input type="password" placeholder="Konfirmasi Password" class="frame-2" required>

        <div class="frame-3">
          <img class="line" src="img/line-1.svg" />
          <div class="text-wrapper-3">or</div>
          <img class="img" src="img/line-2.svg" />
        </div>

        <div class="frame-4">
          <img class="image" src="img/image-11.png" />
          <div class="text-wrapper-3">Register with Google</div>
        </div>

        <button type="submit" class="frame-5">
          <div class="text-wrapper-4">Sign Up</div>
        </button>

      </form>

      <div class="frame-6">
        <p class="p">
          Already have an account?
          <a href="login.html" style="color:#0c72a6; font-weight:600;">Sign In</a>
        </p>
      </div>
    </div>
</body>

</html>
